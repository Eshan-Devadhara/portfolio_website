<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    
    <!-- Navbar -->
    <nav class="bg-black border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <div class="font-bold text-xl tracking-widest">COMMAND CENTER</div>
        <div class="flex items-center gap-4">
            <span>Admin</span>
            <a href="{{ url_for('admin.logout') }}" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-8">Incoming Transmissions</h1>
        
        <div class="grid gap-4">
            {% for msg in messages %}
            <div class="bg-gray-800 p-6 rounded-lg border-l-4 border-blue-500 shadow-lg">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-xl font-bold text-white">{{ msg.subject }}</h3>
                        <p class="text-gray-400 text-sm">From: {{ msg.name }} <span class="text-gray-600">&lt;{{ msg.email }}&gt;</span></p>
                    </div>
                    <span class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-400">{{ msg.timestamp.strftime('%Y-%m-%d %H:%M') }}</span>
                </div>
                <p class="text-gray-300 leading-relaxed bg-gray-900 p-4 rounded">{{ msg.message }}</p>
            </div>
            {% else %}
            <div class="text-gray-500 text-center py-10">No messages received.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
